name: 'Filter Update Files'
description: 'Download and filter updated files by comparing commits'
inputs:
  config_file:
    description: 'Config file path for storing commit SHA'
    required: false
    default: 'latest_translation_commit.json'
  working_directory:
    description: 'Working directory path'
    required: false
    default: '.'
  filter_by_cloud_toc:
    description: 'Filter files by cloud TOC'
    required: false
    default: 'false'
  folder:
    description: 'Comma-separated list of folders to scope the diff to'
    required: false
  files:
    description: 'Comma-separated list of specific files to download (if provided, uses file mode instead of commit comparison)'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm i

    - name: Filter update files
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        ARGS=(--config "${{ inputs.config_file }}" --working-dir "${{ inputs.working_directory }}")
        if [ "${{ inputs.filter_by_cloud_toc }}" == "true" ]; then
          ARGS+=(--filter-by-cloud-toc)
        fi
        if [ -n "${{ inputs.files }}" ]; then
          ARGS+=(--files "${{ inputs.files }}")
        fi
        if [ -n "${{ inputs.folder }}" ]; then
          ARGS+=(--folder "${{ inputs.folder }}")
        fi
        node ${{ github.action_path }}/index.js "${ARGS[@]}"
